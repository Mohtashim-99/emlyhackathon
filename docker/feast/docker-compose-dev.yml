volumes:
  mysql_data: null
  repo: null
services:
  feast:
      image: remis_feast:dev
      container_name: feast_backend
      working_dir: /app/apps/feast
      command: yarn dev
      build:
        context: ../../
        dockerfile: ./docker/feast/Dockerfile
      volumes:
        - "repo:/app"
        - "../../:/app"
      depends_on:
        - mysql
        - redis
      environment:
        PORT: 3000
        DATABASE_HOST: mysql
        DATABASE_PORT: 3306
        DATABASE_USER: root
        DATABASE_PASSWORD: "${DATABASE_PASSWORD:-feastpassword}"
        DATABASE_NAME: feast
        APP_NAME: Feast
        REDIS_HOST: redis
        REDIS_PORT: 6379
        REDIS_TTL: 60

      ports:
        - "3000:3000"
      networks:
        - feast_dev
  mysql:
    image: "mysql:8.0"
    container_name: feast_mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${DATABASE_PASSWORD:-feastpassword}"
      MYSQL_DATABASE: feast
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - feast_dev
  redis:
    container_name: feast_redis
    image: "redis/redis-stack-server:7.2.0-v17"
    ports:
      - "6379:6379"
    networks:
      - feast_dev
  migration: 
    container_name: feast_migration
    build:
      context: ../../
      dockerfile: ./docker/feast/Dockerfile
    image: "remis_feast:dev"
    working_dir: /app/apps/feast
    command: yarn db:migrate 
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: "${DATABASE_USER:-root}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-feastpassword}"
      DATABASE_NAME: feast
      APP_NAME: Feast
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
    networks:
      - feast_dev
  studio:
    container_name: feast_studio
    build:
      context: ../../
      dockerfile: ./docker/feast/Dockerfile
    image: "remis_feast:dev"
    working_dir: /app/apps/feast
    command: yarn studio
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: "${DATABASE_USER:-root}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-feastpassword}"
      DATABASE_NAME: feast
      APP_NAME: Feast
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
    networks:
      - feast_dev


networks:
  feast_dev:
    driver: bridge